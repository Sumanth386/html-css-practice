<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="titan.png" alt="Titan Watch">
            <div class="content">
                <h2>Titan Analog Watch</h2>
                <p class="price">₹2,999</p>
                <p class="description">
                    Elegant Titan watch with premium leather strap and water-resistant design. Perfect for everyday wear.
                </p>
                <div class="rating">
                    ★★★★☆
                    <span>4.5 / 5</span>
                </div>
                <button>Add to cart</button>
            </div>
        </div>
    </div>
</body>
</html>
