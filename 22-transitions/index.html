<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Example 1</title>
    <style>
        button {
            padding: 10px 20px;
            background-color: lightblue;
            border: none;
            border-radius: 20px;
            width: 100px;
            height: 100px;

            transition: all 1s ease-in-out;
        }

        button:hover {
            background-color: blue;
            color: white;
            width: 200px;
        }
    </style>
</head>
<body>
    <button>Hover Me</button>
</body>
</html>
